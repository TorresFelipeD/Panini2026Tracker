<ng-container *ngIf="sticker as selected">
  <div class="overlay" (click)="close.emit()">
    <section class="modal" (click)="$event.stopPropagation()">
      <header class="modal-header">
        <div class="modal-header__copy">
          <p class="modal-eyebrow">
            <img [src]="getCountryFlagUrl(selected.flagCode)" alt="" aria-hidden="true"
              style="width:1rem;height:.75rem;border-radius:.18rem;object-fit:cover;">
            <span>{{ selected.countryName }}</span>
          </p>
          <h2>{{ selected.displayName }}</h2>
          <span class="modal-code" style="margin-top:.4rem;">{{ selected.stickerCode }}</span>
        </div>
        <button type="button" class="modal-close" aria-label="Cerrar detalle de lámina" (click)="close.emit()">
          <span class="modal-close__icon" aria-hidden="true"></span>
        </button>
      </header>

      <form (ngSubmit)="submit()">
        <div class="modal-grid">
        <div class="preview" style="width:min(100%,22rem);justify-self:center;">
          <img *ngIf="selected.imageUrl; else noImage" [src]="selected.imageUrl" [alt]="selected.displayName"
            [class.preview-image--missing]="!isOwned">
          <ng-template #noImage>
            <div class="empty-preview">{{ selected.stickerCode }}</div>
          </ng-template>

          <fieldset class="status-field" style="text-align:center;">
            <legend>
              Estado
              <button
                type="button"
                class="field-help__icon"
                appTooltip="Marca si la lámina ya está en tu colección"
                aria-label="Ayuda sobre el estado de la lámina">
                ?
              </button>
            </legend>
            <div class="status-toggle status-toggle--single field-grid--single">
              <button type="button" class="status-toggle__option status-toggle__option--single"
                [class.status-toggle__option--active]="isOwned" [attr.aria-pressed]="isOwned"
                [style.background]="isOwned ? 'var(--accent-color)' : null" [style.color]="isOwned ? '#061013' : null"
                [style.border-color]="isOwned ? 'transparent' : null"
                style="display:flex;align-items:center;justify-content:space-between;gap:.9rem;"
                (click)="isOwned = !isOwned">
                <span class="status-toggle__copy" style="display:grid;gap:.2rem;text-align:left;">
                  <span class="status-toggle__title">{{ isOwned ? 'Obtenida' : 'Faltante' }}</span>
                  <span class="status-toggle__hint">
                    {{ isOwned ? 'Ya está en tu colección' : 'Aún no la tienes' }}
                  </span>
                </span>
                <span class="status-toggle__icon" aria-hidden="true"
                  [style.color]="isOwned ? '#28c78b' : '#ef6b73'"
                  style="flex:0 0 auto;width:1.9rem;height:1.9rem;">
                  <svg *ngIf="isOwned; else missingStatusIcon" viewBox="0 0 24 24" focusable="false"
                    style="width:100%;height:100%;">
                    <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"
                      stroke-linecap="round" stroke-linejoin="round"></circle>
                    <path d="M8 12.5l2.5 2.5L16 9.5" fill="none" stroke="currentColor" stroke-width="2.1"
                      stroke-linecap="round" stroke-linejoin="round"></path>
                  </svg>
                  <ng-template #missingStatusIcon>
                    <svg viewBox="0 0 24 24" focusable="false" style="width:100%;height:100%;">
                      <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round"></circle>
                      <path d="M9 9l6 6M15 9l-6 6" fill="none" stroke="currentColor" stroke-width="2.1"
                        stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                  </ng-template>
                </span>
              </button>
            </div>
          </fieldset>
        </div>

        <div class="details" style="gap:.85rem;">
          <div class="player-fields" *ngIf="isPlayer">
            <label class="field">
              <span class="field-label">
                <span>Fecha de nacimiento</span>
                <button
                  type="button"
                  class="field-help__icon"
                  appTooltip="Ejemplo: 16-2-2008"
                  aria-label="Ayuda sobre la fecha de nacimiento">
                  ?
                </button>
              </span>
              <input [(ngModel)]="birthday" name="birthday" placeholder="16-2-2008">
            </label>

            <label class="field">
              <span class="field-label">
                <span>Estatura</span>
                <button
                  type="button"
                  class="field-help__icon"
                  appTooltip="Ejemplo: 1.77 m"
                  aria-label="Ayuda sobre la estatura">
                  ?
                </button>
              </span>
              <input [(ngModel)]="height" name="height" placeholder="1.77 m">
            </label>

            <label class="field">
              <span class="field-label">
                <span>Peso</span>
                <button
                  type="button"
                  class="field-help__icon"
                  appTooltip="Ejemplo: 76 kg"
                  aria-label="Ayuda sobre el peso">
                  ?
                </button>
              </span>
              <input [(ngModel)]="weight" name="weight" placeholder="76 kg">
            </label>

            <label class="field">
              <span class="field-label">
                <span>Equipo</span>
                <button
                  type="button"
                  class="field-help__icon"
                  appTooltip="Ejemplo: FK Dinamo Moskva (RUS)"
                  aria-label="Ayuda sobre el equipo">
                  ?
                </button>
              </span>
              <input [(ngModel)]="team" name="team" placeholder="FK Dinamo Moskva (RUS)">
            </label>
          </div>

          <label class="field">
            <span class="field-label">
              <span>Repetidas</span>
              <button
                type="button"
                class="field-help__icon"
                appTooltip="Indica cuántas láminas repetidas tienes de este sticker"
                aria-label="Ayuda sobre la cantidad de repetidas">
                ?
              </button>
            </span>
            <div class="number-field">
              <input type="number" min="0" [(ngModel)]="duplicateCount" name="duplicateCount">
              <div class="number-stepper">
                <button type="button" class="number-step" (click)="incrementDuplicates()">
                  <span aria-hidden="true"></span>
                </button>
                <button type="button" class="number-step number-step--down" (click)="decrementDuplicates()">
                  <span aria-hidden="true"></span>
                </button>
              </div>
            </div>
          </label>

          <label class="field">
            <span class="field-label">
              <span>Observaciones</span>
              <button
                type="button"
                class="field-help__icon"
                appTooltip="Agrega una nota corta o dato útil sobre esta lámina"
                aria-label="Ayuda sobre las observaciones">
                ?
              </button>
            </span>
            <textarea rows="2" [(ngModel)]="notes" name="notes"></textarea>
          </label>
        </div>
      </div>

        <footer
          style="justify-content:center;padding-top:1rem;margin-top:1.1rem;border-top:1px solid color-mix(in srgb, var(--border-color) 72%, transparent);">
          <button type="submit" class="primary" style="width:min(28rem,100%);">Guardar cambios</button>
        </footer>
      </form>
    </section>
  </div>
</ng-container>
