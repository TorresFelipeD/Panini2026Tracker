<div class="shell">
  <header class="topbar">
    <div class="topbar-brand">
      <div>
        <p class="eyebrow">Álbum Mundial 2026 Tracker</p>
        <h1>Seguimiento del álbum Panini 2026</h1>
      </div>

      <div class="topbar-mobile-actions">
        <button
          type="button"
          class="nav-toggle"
          [class.nav-toggle--open]="isNavOpen()"
          [attr.aria-expanded]="isNavOpen()"
          aria-controls="app-navigation"
          aria-label="Abrir o cerrar navegación"
          (click)="toggleNav()">
          <span class="nav-toggle__line"></span>
          <span class="nav-toggle__line"></span>
          <span class="nav-toggle__line"></span>
        </button>

        <button
          type="button"
          class="theme-toggle"
          [class.theme-toggle--dark]="themeService.isDark()"
          [attr.aria-label]="themeService.isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
          [attr.title]="themeService.isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
          (click)="themeService.toggle()">
          <span class="theme-toggle-track" aria-hidden="true">
            <span class="theme-toggle-glyph theme-toggle-glyph--sun">☀</span>
            <span class="theme-toggle-glyph theme-toggle-glyph--moon">☾</span>
            <span class="theme-toggle-thumb">
              <span>{{ themeService.isDark() ? '☾' : '☀' }}</span>
            </span>
          </span>
        </button>
      </div>
    </div>

    <div class="topbar-actions">
      <nav class="nav" id="app-navigation" [class.nav--open]="isNavOpen()">
        <a
          *ngFor="let item of navItems"
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.exact }">
          {{ item.label }}
        </a>
      </nav>

      <button
        type="button"
        class="theme-toggle theme-toggle--desktop"
        [class.theme-toggle--dark]="themeService.isDark()"
        [attr.aria-label]="themeService.isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
        [attr.title]="themeService.isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
        (click)="themeService.toggle()">
        <span class="theme-toggle-track" aria-hidden="true">
          <span class="theme-toggle-glyph theme-toggle-glyph--sun">☀</span>
          <span class="theme-toggle-glyph theme-toggle-glyph--moon">☾</span>
          <span class="theme-toggle-thumb">
            <span>{{ themeService.isDark() ? '☾' : '☀' }}</span>
          </span>
        </span>
      </button>
    </div>
  </header>

  <main class="content">
    <router-outlet />
  </main>

  <footer class="footer">
    <span>{{ metaService.meta()?.name ?? 'Álbum Mundial 2026 Tracker' }}</span>
    <span>Versión {{ metaService.meta()?.version ?? '0.1.0' }}</span>
  </footer>
</div>

<app-toast-stack />
