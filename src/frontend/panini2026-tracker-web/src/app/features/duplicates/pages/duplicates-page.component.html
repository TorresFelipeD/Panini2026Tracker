<section class="panel">
  <header>
    <div>
      <h2>Láminas repetidas</h2>
      <p>Registro, búsqueda y edición de cantidades repetidas.</p>
    </div>
  </header>

  <div class="toolbar">
    <input [(ngModel)]="search" (ngModelChange)="store.updateFilter(search, countryCodes)" placeholder="Buscar repetidas">
    <div class="filter-picker" [class.filter-picker--open]="countryPickerOpen">
      <button type="button" class="filter-trigger" (click)="toggleCountryPicker()">
        <span>{{ countryLabel }}</span>
        <span class="dropdown-chevron" aria-hidden="true"></span>
      </button>

      <div class="filter-panel dropdown-scroll" *ngIf="countryPickerOpen">
        <div class="filter-panel-actions">
          <div class="filter-search">
            <input [(ngModel)]="countrySearch" placeholder="Buscar país">
            <button
              type="button"
              class="filter-search-clear"
              *ngIf="countrySearch"
              (click)="countrySearch = ''"
              aria-label="Limpiar búsqueda de país">
              ×
            </button>
          </div>
          <button type="button" class="filter-clear" (click)="clearCountries()">
            Deseleccionar todo
          </button>
        </div>

        <button
          type="button"
          class="filter-option"
          *ngFor="let option of countryOptions"
          [class.filter-option--active]="countryCodes.includes(option.value)"
          (click)="toggleCountry(option.value)">
          {{ option.label }}
        </button>

        <div class="filter-empty" *ngIf="!countryOptions.length">
          No se encontraron países.
        </div>
      </div>
    </div>
  </div>

  <button
    type="button"
    class="filter-backdrop"
    *ngIf="countryPickerOpen"
    (click)="closeCountryPicker()"
    aria-label="Cerrar selector de país"></button>

  <div class="table">
    <div class="row row--head">
      <span>Código</span>
      <span>Lámina</span>
      <span>País</span>
      <span>Cantidad</span>
      <span>Acciones</span>
    </div>

    <div class="row" *ngFor="let item of store.items()">
      <span>{{ item.stickerCode }}</span>
      <span>{{ item.displayName }}</span>
      <span>{{ item.countryName }}</span>
      <span>
        <div class="number-field">
          <input #qty type="number" min="0" [value]="item.quantity">
          <div class="number-stepper">
            <button type="button" class="number-step" (click)="increment(qty)">
              <span aria-hidden="true"></span>
            </button>
            <button type="button" class="number-step number-step--down" (click)="decrement(qty)">
              <span aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </span>
      <span class="actions">
        <button type="button" (click)="store.save(item.stickerId, +qty.value)">Guardar</button>
        <button type="button" class="danger" (click)="remove(item.stickerId, item.displayName)">Eliminar</button>
      </span>
    </div>
  </div>
</section>
