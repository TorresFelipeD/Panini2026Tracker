<section class="panel">
  <header>
    <div>
      <h2>Logs del sistema</h2>
      <p>Auditoría funcional con filtros y eliminación confirmada.</p>
    </div>
    <button type="button" class="danger" (click)="confirmDelete()">Eliminar filtrados</button>
  </header>

  <div class="toolbar">
    <label class="field">
      <span>Categoría</span>
      <select
        [(ngModel)]="category"
        (ngModelChange)="onFiltersChange()">
        <option value="">Todas las categorías</option>
        <option *ngFor="let option of categories()" [value]="option">{{ option }}</option>
      </select>
    </label>

    <label class="field">
      <span>Nivel</span>
      <select
        [(ngModel)]="level"
        (ngModelChange)="onFiltersChange()">
        <option value="">Todos los niveles</option>
        <option *ngFor="let option of levels()" [value]="option">{{ option }}</option>
      </select>
    </label>

    <label class="field field--search">
      <span>Detalle</span>
      <input
        [(ngModel)]="search"
        (ngModelChange)="onFiltersChange()"
        placeholder="Buscar en detalles">
    </label>
  </div>

  <article class="log-item" *ngFor="let item of store.items()">
    <div class="log-item__meta">
      <strong>{{ item.action }}</strong>
      <span>{{ item.category }} · {{ item.level }}</span>
      <span>{{ item.createdAtUtc | date:'medium' }}</span>
    </div>
    <p>{{ item.details }}</p>
  </article>
</section>
