<section class="panel">
  <header>
    <div>
      <h2>Logs del sistema</h2>
      <p>Auditoría funcional con filtros y eliminación confirmada.</p>
    </div>
    <button type="button" class="danger" (click)="confirmDelete()">Eliminar filtrados</button>
  </header>

  <div class="toolbar">
    <input [(ngModel)]="category" (ngModelChange)="store.updateFilters(category, level, search)" placeholder="Categoría">
    <input [(ngModel)]="level" (ngModelChange)="store.updateFilters(category, level, search)" placeholder="Nivel">
    <input [(ngModel)]="search" (ngModelChange)="store.updateFilters(category, level, search)" placeholder="Buscar en detalles">
  </div>

  <article class="log-item" *ngFor="let item of store.items()">
    <div class="log-item__meta">
      <strong>{{ item.action }}</strong>
      <span>{{ item.category }} · {{ item.level }}</span>
      <span>{{ item.createdAtUtc | date:'medium' }}</span>
    </div>
    <p>{{ item.details }}</p>
  </article>
</section>
