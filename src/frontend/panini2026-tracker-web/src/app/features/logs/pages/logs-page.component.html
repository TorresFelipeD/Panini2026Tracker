<section class="panel">
  <header>
    <div>
      <h2>Logs del sistema</h2>
      <p>Auditoría funcional con filtros y eliminación confirmada.</p>
    </div>
    <button type="button" class="danger" (click)="confirmDelete()">
      <span class="danger__icon" aria-hidden="true">!</span>
      <span>Eliminar Logs</span>
    </button>
  </header>

  <div class="toolbar">
    <label class="field">
      <span>Categoría</span>
      <div class="filter-picker" [class.filter-picker--open]="openFilter === 'category'">
        <button type="button" class="filter-trigger" (click)="toggleFilter('category')">
          <span>{{ getFilterLabel('category') }}</span>
          <span class="dropdown-chevron" aria-hidden="true"></span>
        </button>

        <div class="filter-panel" *ngIf="openFilter === 'category'">
          <button
            type="button"
            class="filter-option"
            [class.filter-option--active]="category === ''"
            (click)="selectFilter('category', '')">
            {{ filterOptions.category[0].label }}
          </button>

          <button
            type="button"
            class="filter-option"
            *ngFor="let option of categories()"
            [class.filter-option--active]="category === option"
            (click)="selectFilter('category', option)">
            {{ option }}
          </button>
        </div>
      </div>
    </label>

    <label class="field">
      <span>Nivel</span>
      <div class="filter-picker" [class.filter-picker--open]="openFilter === 'level'">
        <button type="button" class="filter-trigger" (click)="toggleFilter('level')">
          <span>{{ getFilterLabel('level') }}</span>
          <span class="dropdown-chevron" aria-hidden="true"></span>
        </button>

        <div class="filter-panel" *ngIf="openFilter === 'level'">
          <button
            type="button"
            class="filter-option"
            [class.filter-option--active]="level === ''"
            (click)="selectFilter('level', '')">
            {{ filterOptions.level[0].label }}
          </button>

          <button
            type="button"
            class="filter-option"
            *ngFor="let option of levels()"
            [class.filter-option--active]="level === option"
            (click)="selectFilter('level', option)">
            {{ option }}
          </button>
        </div>
      </div>
    </label>

    <label class="field field--search">
      <span>Detalle</span>
      <input
        [(ngModel)]="search"
        (ngModelChange)="onFiltersChange()"
        placeholder="Buscar en detalles">
    </label>
  </div>

  <button
    type="button"
    class="filter-backdrop"
    *ngIf="openFilter"
    (click)="closeFilters()"
    aria-label="Cerrar filtros"></button>

  <article class="log-item" *ngFor="let item of store.items()">
    <div class="log-item__meta">
      <strong>{{ item.action }}</strong>
      <div class="log-item__badges">
        <span class="log-badge">{{ item.category }}</span>
        <span class="log-badge" [class]="getLevelBadgeClass(item.level)">{{ item.level }}</span>
      </div>
      <span>{{ item.createdAtUtc | date:'medium' }}</span>
    </div>
    <p>{{ item.details }}</p>
  </article>
</section>
